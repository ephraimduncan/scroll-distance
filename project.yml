name: ScrollDistance
options:
  bundleIdPrefix: com.duncan
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
targets:
  ScrollDistance:
    type: application
    platform: macOS
    sources:
      - ScrollDistance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duncan.ScrollDistance
        PRODUCT_NAME: ScrollDistance
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
